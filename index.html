<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tickethack</title>
  </head>

  <body>
    <!-- ======= HEADER ======= -->
    <header>
      <h1>Tickethack</h1>
      <nav>
        <a href="#">Cart</a>
        <a href="#">Bookings</a>
      </nav>
    </header>

    <!-- ======= MAIN CONTENT ======= -->
    <main>
      <section>
        <h2>Explore the world effortlessly by train!</h2>
        <p>
          Compare, book and enjoy cheap prices for train tickets: your journey
          starts on Tickethack.
        </p>
      </section>

      <section>
        <h3>Search a train</h3>
        <label for="departure">Departure</label>
        <input type="text" id="departure" placeholder="Departure city" />

        <label for="arrival">Arrival</label>
        <input type="text" id="arrival" placeholder="Arrival city" />

        <label for="date">Date</label>
        <input type="date" id="date" />

        <button>Search</button>
      </section>
    </main>

    <!-- ======= FOOTER ======= -->
    <footer>
      <p>&copy; 2024 Tickethack - All rights reserved.</p>
    </footer>
  </body>
</html>
