<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tickethack – Accueil</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="home-page">
    <!-- NAVBAR -->
    <nav class="navbar">
      <a class="brand" href="index.html">Tickethack</a>
      <div class="nav-links">
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="booking.html">Bookings</a>
      </div>
    </nav>

    <!-- HERO -->
    <header class="hero">
      <div class="hero-overlay">
        <h1>Explore the world effortlessly by train!</h1>
        <p>
          Compare, book and enjoy cheap prices for train tickets: your journey
          starts on Tickethack.
        </p>
      </div>
    </header>

    <!-- MAIN CONTENT : search + results -->
    <main class="home-layout">
      <!-- SEARCH FORM -->
      <section class="search-panel">
        <h2>Find a trip</h2>
        <div class="form-group">
          <label for="departure">Departure</label>
          <input type="text" id="departure" placeholder="City of departure" />
        </div>
        <div class="form-group">
          <label for="arrival">Arrival</label>
          <input type="text" id="arrival" placeholder="City of arrival" />
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" />
        </div>
        <button id="btn-search" class="btn-primary">Search</button>
        <p id="search-error" class="error-msg hidden"></p>
      </section>

      <!-- RESULTS PANEL -->
      <section class="results-panel">
        <div id="results-placeholder" class="placeholder-box">
          <img src="asset/train.png" alt="train" class="train-icon" />
          <p>It's time to book your future trip.</p>
        </div>
        <!-- <div id="results-list" class="hidden"></div> -->
        <div id="results-list" style="display:none;"></div>
      </section>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
