<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tickethack – Cart</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="brand" href="index.html">Tickethack</a>
    <div class="nav-links">
      <a href="cart.html" class="active">Cart (<span id="cart-count">0</span>)</a>
      <a href="booking.html">Bookings</a>
    </div>
  </nav>

  <main class="page-layout">
    <h1 class="page-title">Your Cart</h1>

    <!-- TRIP LIST IN CART -->
    <div id="cart-list">
      <p class="empty-msg">Your cart is empty.</p>
    </div>

    <!-- TOTAL + CHECKOUT -->
    <div id="cart-footer" class="hidden">
      <p class="total-label">Total : <strong id="cart-total">0 €</strong></p>
      <button id="btn-pay" class="btn-primary">Pay</button>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
